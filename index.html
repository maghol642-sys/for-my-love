<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مفاجأة رورو 🎁</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; background: radial-gradient(circle, #1a0b2e 0%, #000 100%); }
        .stage { display: none; text-align: center; backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .active { display: block; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        input { padding: 15px; border-radius: 15px; border: none; font-size: 20px; width: 200px; text-align: center; box-shadow: 0 0 15px #ff4d6d; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: linear-gradient(45deg, #ff4d6d, #880e4f); color: white; border: none; border-radius: 15px; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff4d6d; }
        .gift-box { font-size: 80px; margin: 20px; transition: 0.5s; }
        .gift-box:hover { transform: rotate(15deg) scale(1.2); }
    </style>
</head>
<body>

    <div id="s1" class="stage active">
        <h1 style="color: #ff4d6d;">أهلاً يا رورو ❤️</h1>
        <input type="password" id="pass" placeholder="الرمز السري..." maxlength="4">
        <br><br><button onclick="checkPass()">افتحي المفاجأة</button>
    </div>

    <div id="s2" class="stage">
        <h1>اختاري الهدايا (3 مرات) ✨</h1>
        <div class="gift-box" onclick="openGift(this)">🎁</div>
    </div>

    <div id="s3" class="stage">
        <h1 id="envText">افتحي الظرف (3 مرات) ✉️</h1>
        <div class="gift-box" onclick="openEnv()">💌</div>
    </div>

    <div id="s4" class="stage">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px;">
            <h1 style="color: #ff4d6d;">عيد ميلاد سعيد يا رورو 🎉</h1>
            <p style="font-size: 22px;">بصي يا بطتي.. أنا آسف جداً..<br>كل سنة وأنتِ طيبة يا نور عيني.</p>
        </div>
    </div>

    <script>
        let gifts = 0, env = 0;
        function checkPass() {
            if(document.getElementById('pass').value == "1234") {
                document.getElementById('s1').classList.remove('active');
                document.getElementById('s2').classList.add('active');
            } else alert("حاولي تاني يا رورو!");
        }
        function openGift(el) {
            el.style.transform = "scale(0)";
            gifts++;
            if(gifts == 3) {
                document.getElementById('s2').classList.remove('active');
                document.getElementById('s3').classList.add('active');
            }
        }
        function openEnv() {
            env++;
            if(env < 3) document.getElementById('envText').innerText = "لسه مرة كمان! (" + env + ")";
            else {
                document.getElementById('s3').classList.remove('active');
                document.getElementById('s4').classList.add('active');
                // تأثير بسيط يضيف جو
                document.body.style.background = "radial-gradient(circle, #880e4f 0%, #000 100%)";
            }
        }
    </script>
</body>
</html>
